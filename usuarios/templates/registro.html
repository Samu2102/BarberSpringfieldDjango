{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - BarberSpringfield</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'styles.css' %}">
</head>

<body>
    <div class="registro-wrapper">
        <div class="registro-card">
            <div class="text-center mb-4">
                <h1 class="display-5 fw-bold">Barber<span style="color:#C9A87C;">Springfield</span></h1>
                <p class="text-light-brown">Registro de nuevos usuarios</p>
            </div>

            {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
            <div class="alert {% if message.tags == 'error' %}alert-danger{% else %}alert-{{ message.tags }}{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    </div>
{% endif %}

            <form method="POST">
                {% csrf_token %}
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-yellow">Nombre</label>
                        <input type="text" name="nombre" class="form-control form-control-registro" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-yellow">Apellido</label>
                        <input type="text" name="apellido" class="form-control form-control-registro" required>
                    </div>
                    <div class="mb-3">
    <label class="form-label text-yellow">Cédula</label>
    <input type="text" name="cedula" class="form-control form-control-registro" required>
</div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-yellow">Correo Electrónico</label>
                    <input type="email" name="email" class="form-control form-control-registro" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-yellow">Teléfono</label>
                    <input type="tel" name="telefono" class="form-control form-control-registro" placeholder="Opcional">
                </div>
                <div class="mb-3">
                    <label class="form-label text-yellow">Contraseña</label>
                    <input type="password" name="password" class="form-control form-control-registro" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-yellow">Confirmar Contraseña</label>
                    <input type="password" name="confirm_password" class="form-control form-control-registro" required>
                </div>
                <button type="submit" class="btn btn-primary-custom w-100 py-2">
    <i class="bi bi-person-check me-2"></i>Registrarse
</button>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'login' %}" class="text-light-brown">¿Ya tienes cuenta? Inicia sesión</a>
            </div>
            <div class="text-center mt-3">
                <a href="{% url 'inicio' %}" class="link-registro">
                    <i class="bi bi-arrow-left"></i> Volver al inicio
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
